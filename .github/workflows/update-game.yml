name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create output directory
        run: mkdir -p output

      - name: Install gh-space-shooter
        run: pip install gh-space-shooter

      - name: Generate game
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh-space-shooter Ojesh-Mundale --output output/game.gif

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add .

          git diff --staged --quiet || git commit -m "Update Space Shooter Game"

          git push
